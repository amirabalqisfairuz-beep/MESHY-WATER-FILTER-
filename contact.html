</head>

<body>

<header>

<nav>

<div class="logo">

<section class="page-banner">

<h1>Contact Us</h1>

<p>Get in touch with our team for enquiries and support.</p>

</section>

<section class="contact-container">

<div class="contact-info">

<h2>Get In Touch</h2>

<p><i class="fa-solid fa-phone"></i> +60 12-345 6789</p>

<p><i class="fa-solid fa-envelope"></i> support@meshy.com</p>

<p><i class="fa-solid fa-location-dot"></i> Malaysia</p>

</div>

<div class="contact-form">

<form action="#" method="post">

<div class="form-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
</div>

<div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
    <label for="subject">Subject</label>
    <input type="text" id="subject" name="subject" placeholder="Enter subject">
</div>

<div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
</div>

<button type="submit" class="submit-btn">
    Send Message
</button>

</form>

</div>

</section>

<section class="map">

<h2>Our Location</h2>

<iframe 

src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d..." 
width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">

</iframe>

</section>
